<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">

  <title>Welcome to SwipeEat</title>

  <!-- Inline tutorial styling -->
  <style>
    :root{
      /* SwipeEat palette (from your brand board) */
      --peach: #FFE8DA;
      --taupe: #5F5143;
      --espresso: #4F3525;
      --olive: #686928;
      --orange: #D17F2D;

      /* App tokens mapped to the palette (match menu file) */
      --bg: var(--peach);
      --card: #FFF7F1;
      --muted: var(--taupe);
      --text: var(--espresso);

      --accent: var(--orange);
      --accent-600: #B56A22;
      --ring: rgba(209,127,45,.32);

      --radius: 18px;
      --shadow: 0 10px 20px rgba(79,53,37,.16);
      --shadow-strong: 0 16px 28px rgba(79,53,37,.22);
      --stroke: rgba(95,81,67,.22);

      /* Preserve original action colors (as before) */
      --primary-blue: #007bff;
      --primary-blue-hover: #0056b3;
      --go-back-gray: #6c757d;
      --go-back-gray-hover: #5a6268;
    }

    *{ box-sizing: border-box; }
    html, body{ height: 100%; }

    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: radial-gradient(1200px 800px at 20% -10%, var(--card) 0%, var(--bg) 60%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      line-height: 1.45;
      padding: 16px;
    }

    .tutorial-container{
      background: linear-gradient(180deg, var(--card), var(--bg));
      padding: 22px;
      width: 80%;
      max-width: 520px;
      border-radius: var(--radius);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .title{
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: .2px;
      text-shadow: 2px 2px 6px rgba(79,53,37,.18);
    }

    .title-logo{
      height: 100px;
      width: auto;
      display: block;
      margin: 0 auto 6px;
      object-fit: contain;
    }

    .tutorial-container p{
      margin: 8px 0 14px;
      color: rgba(95,81,67,.95);
    }

    .tutorial-container h3{
      margin: 14px 0 6px;
      color: var(--espresso);
      letter-spacing: .2px;
    }

    .sample-card{
      position: relative;
      margin: 16px auto;
      width: 86%;
      padding: 14px;
      border: 1px dashed rgba(95,81,67,.35);
      background: rgba(255,232,218,.55);
      border-radius: 14px;
      box-shadow: 0 6px 14px rgba(79,53,37,.10);
      transition: transform 0.5s ease, opacity 0.5s ease;
    }

    .sample-card img{
      display: block;
      margin: 0 auto 10px;
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 12px;
    }

    .sample-card h4{
      margin: 8px 0 4px;
      color: var(--espresso);
      font-weight: 800;
      letter-spacing: .2px;
    }

    .sample-card p{
      margin: 0;
      color: rgba(95,81,67,.95);
      font-size: .95rem;
    }

    .hidden{ display: none !important; }

    .swipe-left{
      transform: translateX(-100%);
      opacity: 0;
    }

    .swipe-right{
      transform: translateX(100%);
      opacity: 0;
    }

    /* Buttons (preserve original colors) */
    .button{
      display: inline-block;
      padding: 10px 18px;
      margin: 6px;
      color: #fff;
      background-color: var(--primary-blue);
      text-decoration: none;
      border-radius: 4px;
      cursor: pointer;
      border: none;
      box-shadow: 0 6px 14px rgba(0,123,255,.22);
      transition: transform .05s ease, background-color .15s ease, box-shadow .15s ease;
      font: inherit;
    }

    .button:hover{
      background-color: var(--primary-blue-hover);
    }

    .button:active{
      transform: translateY(1px) scale(.99);
    }

    /* Specific styling for the go-back button (keep gray) */
    .go-back{
      background-color: var(--go-back-gray);
      box-shadow: 0 6px 14px rgba(108,117,125,.20);
    }

    .go-back:hover{
      background-color: var(--go-back-gray-hover);
    }

    /* Make the undo control a true circular icon button */
    #go-back-button{
      width: 46px;
      height: 46px;
      padding: 0;
      border-radius: 999px;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      line-height: 1;
    }

    /* Ensure the icon is visible and centered */
    #go-back-button .undo-icon{
      font-size: 1.25rem;
      line-height: 1;
      color: #fff;
    }

    .step-message{
      margin-top: 10px;
      min-height: 40px;
      color: rgba(79,53,37,.95);
      background: rgba(255,247,241,.75);
      border: 1px solid var(--stroke);
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: 0 6px 14px rgba(79,53,37,.08);
    }
  </style>
</head>
<body>

<div class="tutorial-container">
  <h1 class="title">Welcome to</h1>
  <header>
    <img
      class="title-logo"
      src="{{ url_for('static', filename='logo.png') }}"
      alt="SwipeEat logo"
    >
  </header>

  <p>Your smart assistant to choose the best meal that fits your preference.</p>
  <h3>How does it work?</h3>

  <!-- Sample meal card for tutorial -->
  <div id="sample-card" class="sample-card">
    <img
      src="{{ url_for('static', filename='meal_images/sample_meal.png') }}"
      alt="Sample Meal"
    />
    <h4 id="meal-title">Sample Meal</h4>
    <p id="meal-description">Try swiping this card!</p>
  </div>

  <!-- Instruction message -->
  <div class="step-message" id="step-message">
    Step 1: Swipe right (→) if you like a meal.
  </div>

  <!-- Undo/Reload button (hidden initially) -->
  <button id="go-back-button" class="button go-back hidden" type="button" aria-label="Undo">
    <span class="undo-icon" aria-hidden="true">↶</span>
  </button>

  <!-- Final Start Swiping button (hidden initially) -->
  <a href="{{ url_for('food_swipe') }}"
     id="start-button"
     class="button hidden">
    Start Swiping
  </a>
</div>

<script>
  /**********************************************
   * TUTORIAL STEPS:
   * step = 1 -> User must swipe right (like)
   * step = 2 -> User must swipe left (dislike)
   * step = 3 -> User can click the "go back" icon to undo
   * step = 4 -> Show "Start Swiping" button
   **********************************************/
  let tutorialStep = 1;

  const stepMessage = document.getElementById("step-message");
  const sampleCard = document.getElementById("sample-card");
  const goBackButton = document.getElementById("go-back-button");
  const startButton = document.getElementById("start-button");

  // For swipe gestures
  let touchstartX = 0;
  let touchendX = 0;

  function handleSwipe(direction) {
    console.log(`Tutorial swipe: ${direction}, step = ${tutorialStep}`);

    // Animate the card with a swipe effect
    sampleCard.classList.add(direction === "right" ? "swipe-right" : "swipe-left");

    setTimeout(() => {
      // Reset card animation classes
      sampleCard.classList.remove("swipe-right", "swipe-left");

      // Step logic
      if (tutorialStep === 1 && direction === "right") {
        tutorialStep = 2;
        stepMessage.textContent = "Step 2: Swipe left (←) if you do not like a meal.";
      } else if (tutorialStep === 1 && direction === "left") {
        stepMessage.textContent = "Try swiping right! (→)";
      } else if (tutorialStep === 2 && direction === "left") {
        tutorialStep = 3;
        stepMessage.textContent = "Step 3: Now click the undo button (↶) to go back to the previous meal.";
        // Reveal the go-back button
        goBackButton.classList.remove("hidden");
      } else if (tutorialStep === 2 && direction === "right") {
        stepMessage.textContent = "Try swiping left! (←)";
      } else {
        stepMessage.textContent = "Follow the instructions!";
      }
    }, 500);
  }

  // Go-back (undo) button logic
  goBackButton.addEventListener("click", () => {
    if (tutorialStep === 3) {
      stepMessage.textContent = "Reloaded! Now you are ready to start swiping for real.";
      goBackButton.classList.add("hidden");
      tutorialStep = 4; // Final step reached

      // Reveal the Start Swiping button
      startButton.classList.remove("hidden");
    }
  });

  /**********************************************
   * KEYBOARD EVENT LISTENER FOR SWIPE
   **********************************************/
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") {
      handleSwipe("right");
    } else if (e.key === "ArrowLeft") {
      handleSwipe("left");
    }
  });

  /**********************************************
   * TOUCH (MOBILE SWIPE) EVENT LISTENERS
   **********************************************/
  document.addEventListener("touchstart", (e) => {
    touchstartX = e.changedTouches[0].screenX;
  });
  document.addEventListener("touchend", (e) => {
    touchendX = e.changedTouches[0].screenX;
    const diff = touchendX - touchstartX;
    if (diff < -50) {
      handleSwipe("left");
    } else if (diff > 50) {
      handleSwipe("right");
    }
  });
</script>

</body>
</html>
