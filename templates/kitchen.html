<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Kitchen Mode</title><style>body{margin:0;font-family:system-ui;color:#4F3525;background:#FFE8DA}.header{position:sticky;top:0;background:rgba(255,232,218,.94);border-bottom:1px solid rgba(95,81,67,.22);padding:14px 16px}.page{width:min(1100px,100%);margin:0 auto;padding:16px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab,button{border:0;border-radius:10px;padding:10px 12px;background:#D17F2D;color:#fff;font:inherit;font-weight:900;cursor:pointer}.tab.active{background:#686928}.orders{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.order{background:#FFF7F1;border:1px solid rgba(95,81,67,.22);border-radius:12px;padding:14px;box-shadow:0 8px 16px rgba(79,53,37,.12)}.order h2{margin:0 0 8px}.meta{color:rgba(95,81,67,.9);font-weight:700}@media(max-width:760px){.orders{grid-template-columns:1fr}.tab,button{min-height:44px}}</style></head><body><header class="header"><strong>Kitchen Mode</strong> <span id="live">Live</span><span id="toast" style="margin-left:12px;font-weight:900;color:#686928"></span></header><main class="page"><div class="tabs" id="tabs"></div><section class="orders" id="orders"></section></main><script>const CSRF_TOKEN="{{ csrf_token() }}";const statuses=['active','new','preparing','completed','cancelled'];let current='active';const tabs=document.getElementById('tabs');const ordersEl=document.getElementById('orders');let latestSeenOrderId=null;function notifyNewOrder(id){const toast=document.getElementById('toast');toast.textContent='New order #' + id;setTimeout(()=>toast.textContent='',2500);try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator();osc.frequency.value=880;osc.connect(ctx.destination);osc.start();setTimeout(()=>{osc.stop();ctx.close();},120);}catch(e){}}function renderTabs(){tabs.innerHTML='';statuses.forEach(s=>{const b=document.createElement('button');b.className='tab'+(s===current?' active':'');b.textContent=s;b.onclick=()=>{current=s;renderTabs();refresh();};tabs.appendChild(b);});}async function setStatus(id,status){await fetch(`/admin/orders/${id}`,{method:'PUT',headers:{'Content-Type':'application/json','X-CSRF-Token':CSRF_TOKEN},body:JSON.stringify({status})});refresh();}function nextButton(o){if(o.status==='new')return `<button onclick="setStatus(${o.id},'preparing')">Start</button>`;if(o.status==='preparing')return `<button onclick="setStatus(${o.id},'completed')">Complete</button>`;return '';}async function refresh(){document.getElementById('live').textContent='Updating';const r=await fetch(`/admin/orders?status=${current}`);if(!r.ok)return;const d=await r.json();ordersEl.innerHTML='';if(!d.orders.length)ordersEl.innerHTML='<p>No orders here.</p>';const newest=d.orders.length?d.orders[0].id:null;if(newest&&latestSeenOrderId&&newest>latestSeenOrderId)notifyNewOrder(newest);if(newest)latestSeenOrderId=newest;d.orders.forEach(o=>{const a=document.createElement('article');a.className='order';a.innerHTML=`<h2>#${o.id} ${o.mealName} x${o.quantity}</h2><p class="meta">${o.status} - Table ${o.tableNumber||'not set'}</p><p>${o.notes||''}</p><p>Total: $${Number(o.totalPrice||0).toFixed(2)} - ${o.paymentStatus}</p><p>ETA: ${o.estimatedMinutes} min</p>${nextButton(o)} <button onclick="setStatus(${o.id},'cancelled')">Cancel</button>`;ordersEl.appendChild(a);});document.getElementById('live').textContent='Live';}renderTabs();refresh();setInterval(refresh,5000);</script></body></html>
