<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ restaurant_settings.restaurantName }} Kitchen</title>
  <style>
    :root{--peach:#FFE8DA;--espresso:#4F3525;--olive:#686928;--orange:#D17F2D;--card:#FFF7F1;--stroke:rgba(95,81,67,.22);--danger:#dc3545;--success:#27704f;--info:#2f6f89}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;color:var(--espresso);background:var(--peach)}
    .header{position:sticky;top:0;z-index:3;background:rgba(255,232,218,.94);border-bottom:1px solid var(--stroke);padding:14px 16px;backdrop-filter:blur(8px)}
    .header-inner,.page{width:min(1120px,100%);margin:0 auto}.header-inner{display:flex;justify-content:space-between;align-items:center;gap:12px}.page{padding:16px}.live{font-weight:900;color:var(--olive)}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.nav-link{border-radius:10px;padding:10px 12px;background:var(--olive);color:#fff;text-decoration:none;font-weight:900}.item-list{display:grid;gap:6px}.item-row{padding:8px;border-radius:9px;background:rgba(95,81,67,.08)}.tab,button{border:0;border-radius:10px;padding:11px 13px;background:var(--orange);color:#fff;font:inherit;font-weight:900;cursor:pointer;min-height:44px}.tab.active{background:var(--olive)}button.danger{background:var(--danger)}button.secondary{background:var(--olive)}
    .orders{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.order{background:var(--card);border:1px solid var(--stroke);border-radius:12px;padding:14px;box-shadow:0 8px 16px rgba(79,53,37,.12);display:grid;gap:10px}.order h2{margin:0;font-size:1.25rem}.meta{color:rgba(95,81,67,.9);font-weight:750}.badges,.actions{display:flex;gap:8px;flex-wrap:wrap}.badge{display:inline-flex;padding:4px 8px;border-radius:999px;font-size:.78rem;font-weight:900;text-transform:capitalize}.badge-new,.badge-unpaid{background:rgba(209,127,45,.14);color:#9a5516}.badge-preparing,.badge-refunded{background:rgba(47,111,137,.14);color:var(--info)}.badge-completed,.badge-paid{background:rgba(39,112,79,.14);color:var(--success)}.badge-cancelled{background:rgba(220,53,69,.12);color:var(--danger)}.note{padding:10px;border-radius:10px;background:rgba(95,81,67,.08)}
    @media(max-width:760px){.header-inner{align-items:flex-start;flex-direction:column}.orders{grid-template-columns:1fr}.tab,button{flex:1 1 auto}.actions button{width:100%;font-size:1.05rem}.order h2{font-size:1.35rem}}
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><strong>{{ restaurant_settings.restaurantName }} Kitchen</strong><span><a class="nav-link" href="{{ url_for('admin') }}">Admin Dashboard</a> <span id="live" class="live">Live</span><span id="toast" style="margin-left:12px;font-weight:900;color:#686928"></span></span></div></header>
  <main class="page"><div class="tabs" id="tabs"></div><section class="orders" id="orders"></section></main>
  <script>
    const CSRF_TOKEN="{{ csrf_token() }}";
    const statuses=["active","new","preparing","completed","cancelled"];
    let current="active";
    const tabs=document.getElementById("tabs");
    const ordersEl=document.getElementById("orders");
    let latestSeenOrderId=null;
    function badge(value){return `<span class="badge badge-${value}">${value}</span>`;}
    function escapeHtml(value){return String(value ?? "").replace(/[&<>'"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[ch]));}
    function notifyNewOrder(id){const toast=document.getElementById("toast");toast.textContent="New order #"+id;setTimeout(()=>toast.textContent="",2500);try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator();osc.frequency.value=880;osc.connect(ctx.destination);osc.start();setTimeout(()=>{osc.stop();ctx.close();},120);}catch(e){}}
    function renderTabs(){tabs.innerHTML="";statuses.forEach(status=>{const button=document.createElement("button");button.className="tab"+(status===current?" active":"");button.textContent=status;button.type="button";button.onclick=()=>{current=status;renderTabs();refresh();};tabs.appendChild(button);});}
    async function setStatus(id,status){await fetch(`/admin/orders/${id}`,{method:"PUT",headers:{"Content-Type":"application/json","X-CSRF-Token":CSRF_TOKEN},body:JSON.stringify({status})});refresh();}
    function nextButtons(order){const buttons=[];if(order.status==="new")buttons.push(`<button class="secondary" onclick="setStatus(${order.id},'preparing')">Start Preparing</button>`);if(order.status==="preparing")buttons.push(`<button class="secondary" onclick="setStatus(${order.id},'completed')">Complete Order</button>`);if(order.status!=="cancelled"&&order.status!=="completed")buttons.push(`<button class="danger" onclick="setStatus(${order.id},'cancelled')">Cancel</button>`);return buttons.join("");}
    async function refresh(){document.getElementById("live").textContent="Updating";const response=await fetch(`/admin/orders?status=${current}`);if(!response.ok)return;const data=await response.json();ordersEl.innerHTML="";if(!data.orders.length)ordersEl.innerHTML="<p>No orders here.</p>";const newest=data.orders.length?data.orders[0].id:null;if(newest&&latestSeenOrderId&&newest>latestSeenOrderId)notifyNewOrder(newest);if(newest)latestSeenOrderId=newest;data.orders.forEach(order=>{const article=document.createElement("article");article.className="order";const items=(order.items||[]).map(item=>`<div class="item-row"><strong>${escapeHtml(item.mealName)} x${item.quantity}</strong>${item.notes?`<br><span>${escapeHtml(item.notes)}</span>`:""}</div>`).join("");article.innerHTML=`<div><h2>#${order.id} ${escapeHtml(order.mealName)} x${order.quantity}</h2><div class="badges">${badge(order.status)}${badge(order.paymentStatus)}</div></div><div class="meta">Table ${escapeHtml(order.tableNumber||"not set")} - ETA ${order.estimatedMinutes} min - $${Number(order.totalPrice||0).toFixed(2)}</div><div class="item-list">${items}</div>${order.notes?`<div class="note"><strong>Customer note:</strong> ${escapeHtml(order.notes)}</div>`:""}<div class="actions">${nextButtons(order)}</div>`;ordersEl.appendChild(article);});document.getElementById("live").textContent="Live";}
    function connectOrderEvents(){if(!window.EventSource)return;const events=new EventSource("/admin/events");events.addEventListener("open",()=>document.getElementById("live").textContent="Live");events.addEventListener("order_created",event=>{try{const data=JSON.parse(event.data);if(data.orderId)notifyNewOrder(data.orderId);}catch(e){}refresh();});events.addEventListener("order_updated",refresh);events.addEventListener("payment_updated",refresh);events.addEventListener("error",()=>document.getElementById("live").textContent="Reconnecting");}
    renderTabs();connectOrderEvents();refresh();setInterval(refresh,30000);
  </script>
</body>
</html>
