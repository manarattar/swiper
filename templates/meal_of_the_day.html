<!-- file: templates/meal_of_the_day.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">

  <title>Meal of the Day</title>

  <!-- Inline styling copied from your Welcome/Tutorial page,
       with only minimal additions for Meal-of-the-Day content. -->
  <style>
    :root{
      /* SwipeEat palette (from your brand board) */
      --peach: #FFE8DA;
      --taupe: #5F5143;
      --espresso: #4F3525;
      --olive: #686928;
      --orange: #D17F2D;

      /* App tokens mapped to the palette (match menu file) */
      --bg: var(--peach);
      --card: #FFF7F1;
      --muted: var(--taupe);
      --text: var(--espresso);

      --accent: var(--orange);
      --accent-600: #B56A22;
      --ring: rgba(209,127,45,.32);

      --radius: 18px;
      --shadow: 0 10px 20px rgba(79,53,37,.16);
      --shadow-strong: 0 16px 28px rgba(79,53,37,.22);
      --stroke: rgba(95,81,67,.22);

      /* Preserve original action colors (as before) */
      --primary-blue: #007bff;
      --primary-blue-hover: #0056b3;
      --go-back-gray: #6c757d;
      --go-back-gray-hover: #5a6268;
    }

    *{ box-sizing: border-box; }
    html, body{ height: 100%; }

    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: radial-gradient(1200px 800px at 20% -10%, var(--card) 0%, var(--bg) 60%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      line-height: 1.45;
      padding: 16px;
    }

    .tutorial-container{
      background: linear-gradient(180deg, var(--card), var(--bg));
      padding: 22px;
      width: 80%;
      max-width: 520px;
      border-radius: var(--radius);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .title{
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: .2px;
      text-shadow: 2px 2px 6px rgba(79,53,37,.18);
    }

    .title-logo{
      height: 100px;
      width: auto;
      display: block;
      margin: 0 auto 6px;
      object-fit: contain;
    }

    .tutorial-container p{
      margin: 8px 0 14px;
      color: rgba(95,81,67,.95);
    }

    /* Meal card (reusing the sample-card visual language) */
    .sample-card{
      position: relative;
      margin: 16px auto;
      width: 86%;
      padding: 14px;
      border: 1px dashed rgba(95,81,67,.35);
      background: rgba(255,232,218,.55);
      border-radius: 14px;
      box-shadow: 0 6px 14px rgba(79,53,37,.10);
    }

    .sample-card img{
      display: block;
      margin: 0 auto 10px;
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 12px;
    }

    .sample-card h4{
      margin: 8px 0 4px;
      color: var(--espresso);
      font-weight: 800;
      letter-spacing: .2px;
      font-size: 1.15rem;
    }

    .sample-card p{
      margin: 0;
      color: rgba(95,81,67,.95);
      font-size: .95rem;
      line-height: 1.45;
    }

    /* Details block styled like the step-message */
    .step-message{
      margin-top: 10px;
      color: rgba(79,53,37,.95);
      background: rgba(255,247,241,.75);
      border: 1px solid var(--stroke);
      border-radius: 12px;
      padding: 12px 12px;
      box-shadow: 0 6px 14px rgba(79,53,37,.08);
      text-align: left;
    }

    .detail-list{
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .detail-list li{
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(95,81,67,.18);
    }

    .detail-list li:last-child{
      padding-bottom: 0;
      border-bottom: none;
    }

    .detail-label{
      font-weight: 800;
      color: var(--espresso);
      white-space: nowrap;
    }

    .detail-value{
      color: rgba(95,81,67,.95);
      font-weight: 700;
      text-align: right;
    }

    /* Buttons (preserve original colors) */
    .button{
      display: inline-block;
      padding: 10px 18px;
      margin: 10px 6px 0;
      color: #fff;
      background-color: var(--primary-blue);
      text-decoration: none;
      border-radius: 4px;
      cursor: pointer;
      border: none;
      box-shadow: 0 6px 14px rgba(0,123,255,.22);
      transition: transform .05s ease, background-color .15s ease, box-shadow .15s ease;
      font: inherit;
    }

    .button:hover{
      background-color: var(--primary-blue-hover);
    }

    .button:active{
      transform: translateY(1px) scale(.99);
    }
  </style>
</head>

<body>
  <div class="tutorial-container">
    <h1 class="title">Meal of the Day</h1>

    <header>
      <img
        class="title-logo"
        src="{{ url_for('static', filename='logo.png') }}"
        alt="SwipeEat logo"
      >
    </header>

    <p>Here is today’s recommended meal based on your preferences.</p>

    <!-- Meal card -->
    <div class="sample-card">
      <img src="{{ meal.img }}" alt="{{ meal.name }} image">
      <h4>{{ meal.emoji }} {{ meal.name }}</h4>
      <p>{{ meal.description }}</p>
    </div>

    <!-- Details -->
    <div class="step-message" aria-label="Meal details">
      <ul class="detail-list">
        <li>
          <span class="detail-label">Cuisine</span>
          <span class="detail-value">{{ meal.category }}</span>
        </li>
        <li>
          <span class="detail-label">Meat kind</span>
          <span class="detail-value">{{ meal.meatKind }}</span>
        </li>
        <li>
          <span class="detail-label">Taste</span>
          <span class="detail-value">{{ meal.taste }}</span>
        </li>
        <li>
          <span class="detail-label">Emotion</span>
          <span class="detail-value">{{ meal.emotion }} {{ meal.emoji }}</span>
        </li>
      </ul>
    </div>

    <!-- Restart button: POSTs to /restart -->
    <form action="{{ url_for('restart') }}" method="POST">
      <button class="button" type="submit">Restart</button>
    </form>
  </div>
</body>
</html>
