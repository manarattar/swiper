<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ status_code }} - {{ title }}</title>
  <style>body{margin:0;min-height:100vh;display:grid;place-items:center;padding:18px;font-family:system-ui;color:#4F3525;background:#FFE8DA}.panel{width:min(560px,100%);background:#FFF7F1;border:1px solid rgba(95,81,67,.22);border-radius:14px;padding:22px;box-shadow:0 10px 20px rgba(79,53,37,.16)}h1{margin:0 0 8px;color:#D17F2D}.code{font-weight:900;color:#686928}.button{display:inline-block;margin-top:14px;border-radius:10px;padding:10px 12px;background:#D17F2D;color:#fff;text-decoration:none;font-weight:900}</style>
</head>
<body>
  <main class="panel">
    <div class="code">{{ status_code }}</div>
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>
    <a class="button" href="{{ url_for('menu') }}">Open Menu</a>
  </main>
</body>
</html>
